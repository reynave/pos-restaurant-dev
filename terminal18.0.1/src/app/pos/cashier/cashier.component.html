<div [ngClass]="{'container': screenWidth >= 1200, 'container-fluid': screenWidth < 1200}">
    <div class="row   mt-2">

        <div class="col-7 col-lg-8  position-relative">
            <div class="row mb-3">
                <div class="col-12">
                    <small>Ver {{ver}}</small>
                </div>
            </div>
            <div class="row g-2 align-items-center mb-2">

                <div class="col-3 mb-1">
                    <a class="btn btn-primary w-100 d-flex flex-column align-items-center" title="Print Queue"
                        (click)="logService.logAction('Click Print Queue');" [routerLink]="['/printQueue']">
                        <i class="bi bi-list-check mb-1"></i>
                        <strong class="mb-0">Print Queue</strong>
                    </a>
                </div>
                <div class="col-3 mb-1">
                    <a class="btn btn-primary w-100 d-flex flex-column align-items-center" title="Setting"
                        (click)="logService.logAction('click setting');" [routerLink]="['/setting']">
                        <i class="bi bi-gear mb-1"></i>
                        <strong class="mb-0">Setting</strong>
                    </a>
                </div>
                <div class="col-3 mb-1">
                    <a class="btn btn-primary w-100 d-flex flex-column align-items-center" title="Adjust Item"
                        (click)="logService.logAction('click Adjustment Item');" [routerLink]="['/items/']">
                        <i class="bi bi-bag-plus mb-1"></i>
                        <strong class="mb-0">Adjust Item</strong>
                    </a>
                </div>
                <div class="col-3 mb-1">
                    <a class="btn btn-primary w-100 d-flex flex-column align-items-center" title="Report"
                        (click)="logService.logAction('click Report')" [routerLink]="['/transaction']">
                        <i class="bi bi-receipt mb-1"></i>
                        <strong class="mb-0">Report</strong>
                    </a>
                </div>
                <div class="col-3 mb-1">
                    <a class="btn btn-primary w-100 d-flex flex-column align-items-center" title="Cash"
                        (click)="logService.logAction('click daily/cashBalance')" [routerLink]="['/daily/cashBalance']">
                        <i class="bi bi-cash-coin mb-1"></i>
                        <strong class="mb-0">Cash</strong>
                    </a>
                </div>
                <div class="col-3 mb-1">
                    <a class="btn btn-primary w-100 d-flex flex-column align-items-center" title="User Logs"
                        (click)="logService.logAction('click User logs')" [routerLink]="['/userLogs']"
                        routerLinkActive="router-link-active">
                        <i class="bi bi-person-exclamation mb-1"></i>
                        <strong class="mb-0">User Logs</strong>
                    </a>
                </div>
                <div class="col-3 mb-1">
                    <a class="btn btn-primary w-100 d-flex flex-column align-items-center"
                        (click)="openInNewTab('/customerDisplay')" title="Customer Display">
                        <i class="bi bi-display mb-1"></i>
                        <strong class="mb-0">Customer Display</strong>
                    </a>
                </div>

            </div>
            <div class="row  g-2">
                <div class="col-6 mb-1">
                    <a class="btn btn-dark w-100 d-flex flex-column align-items-center" title="Sign Off"
                        (click)="signOff(); ">
                        <i class="bi bi-box-arrow-left mb-1"></i>
                        <strong class="mb-0">Sign Off</strong>
                    </a>
                </div>
                <div class="col-6 mb-1">
                    <a class="btn btn-warning w-100 d-flex flex-column align-items-center" title="Daily Close"
                        (click)="dailyClose();">
                        <i class="bi bi-key mb-1"></i>
                        <strong class="mb-0">Daily Close</strong>
                    </a>
                </div>

            </div>
        </div>


        <div class="col-5 col-lg-4 ">

            <div class="order-panel mb-3" style="height: 80vh; overflow-y: auto;">
                <h4>Queue</h4>
                <table class="table table-hover table-borderless ">
                    <tbody>
                        <tr *ngFor="let x of items">
                            <td (click)="goToMenu(x.id)" style="cursor: pointer;">
                                <div>Queue #{{ x.counterNo }}</div>
                                <div class="text-muted">{{ x.startDate | date:'h:mm a' }}</div>
                            </td>
                            <td class="text-end align-content-center" width="100px">
                                <button class="btn btn-danger" (click)="deleteOrder(x.id)" title="Delete Order">
                                    <i class="bi bi-trash3-fill"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-grid">
                <button class="btn btn-success btn-lg py-3" (click)="newOrder()">New Order</button>
            </div>
        </div>


    </div>
</div>
