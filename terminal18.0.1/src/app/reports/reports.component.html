<app-header-menu></app-header-menu>
<div class="container">
	<div class="row g-2">
		<!-- Left menu -->
		<div class="col-12 col-md-4 mb-3">
			<div class="card">
				<div class="card-body p-2">
					<h5 class="card-title mb-2">Reports</h5>
					<ul class="list-group list-group-flush reports-menu">
						<li class="list-group-item" *ngFor="let a of reportsMenu">
							<div class="d-flex justify-content-between align-items-center">
								<div *ngIf="a.items == null || a.items.length === 0">
									<a href="javascript:;" (click)="goTo(a.router, a.title)">
										<strong>{{ a.title }}</strong></a>
								</div>

								<div *ngIf="a.items && a.items.length > 0">
									<a href="javascript:;" (click)="a.show = !a.show">
										<strong>{{ a.title }}</strong></a>
								</div>
								<div *ngIf="a.items && a.items.length > 0">
									<button class="btn btn-sm btn-link p-0" (click)="a.show = !a.show">
										<span [class]="a.show ? 'caret-down' : 'caret-right'"></span>
									</button>
								</div>
							</div>

							<ul class="list-unstyled ms-2 mt-2" *ngIf="a.show">
								<li class="report-item" *ngFor="let sub of a.items"
									[class.active]="selectedReport?.id === sub.id" (click)="goTo(sub.router,  sub.title)">
									{{ sub.title }}
								</li>
							</ul>
						</li>
					</ul>
				</div>
			</div>
		</div>

		<!-- Right content -->
		<div class="col-12 col-md-8">
			
		 
			@if(getReport!= ''){
			<div class="card">
				<div class="card-body">
					<h4>{{titleReport}}</h4>
					<table class="table table-sm table-borderless">
						<tbody>
							<tr>
								<td>Start date</td>
								<td>
									<div class="input-group ">
										<input class="form-control form-control-sm" placeholder="yyyy-mm-dd" name="dp"
											[(ngModel)]="startDate" ngbDatepicker #d="ngbDatepicker" />
										<button class="btn btn-sm btn-outline-secondary bi bi-calendar3"
											(click)="d.toggle()" type="button"></button>
									</div>
								</td>
							</tr>
							<tr>
								<td>End date</td>
								<td>
									<div class="input-group ">
										<input class="form-control form-control-sm" placeholder="yyyy-mm-dd" name="dp"
											[(ngModel)]="endDate" [minDate]="startDate" ngbDatepicker
											#d2="ngbDatepicker" />
										<button class="btn btn-sm btn-outline-secondary bi bi-calendar3"
											(click)="d2.toggle()" type="button"></button>
									</div>
								</td>
							</tr>
							<tr>
								<td></td>
								<td>
									<div class="d-grid"> 
										<button class="btn btn-primary btn-sm me-2 px-4" 
										[disabled]="endDate.year == undefined || startDate.year == undefined" (click)="openInNewTab()">Submit </button>
									</div>
								</td>
							</tr>
						</tbody>
					</table>



				</div>
			</div>
			}

			@if(getReport== ''){
			<div class="text-center py-5 text-muted">
				<p class="mb-1">Tidak ada laporan dipilih.</p>
				<small>Pilih salah satu sub report dari menu untuk melihat data contoh.</small>
			</div>
			}
		</div>
	</div>
</div>
