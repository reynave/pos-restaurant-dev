<div class="row">
    <div class="col-12 " *ngIf="id != 0">


        <div class="header py-2">
            <div class="row">
                <div class="col-3">
                    <strong>ACCESS RIGHT LEVEL {{id}}</strong>
                    <span class="mx-1" *ngIf="loading">
                        <img src="./gif/Pulse@1x-1.0s-200px-200px.gif" height="30">
                    </span>
                </div>
                <div class="col-9 text-end">
                    <span class="btn btn-sm me-2"> <small>Search (CTRL + F)</small></span>
                    @if(disabled==false){
                    <button type="button" class="btn btn-sm btn-light border me-2" (click)="cancel()">Close</button>
                    <button type="button" class="btn btn-sm btn-light border me-2" (click)="onUpdate();">Update</button>

                    <button type="button" class="btn btn-sm btn-dark border me-2"
                        (click)="open(content);">Create</button>
                    <button type="button" class="btn btn-sm btn-danger border me-2"
                        (click)="onDelete();">Delete</button>
                    }
                    @else {
                    <button type="button" class="btn btn-sm btn-light border me-2"
                        (click)="disabled= false">Editable</button>
                    }

                </div>
            </div>

        </div>
        <div class="mainContent border">
            <div class="">

                <div class="table table-sm table-editable table-hover" style="width: max-content;">
                    <table class="table table-sm table-striped table-hover" style="min-width: 50vw;">
                        <thead class="sticky-top ">
                            <tr>


                                <th>#</th>
                                <th>Name</th>
                                <th>category</th>
                                <th >
                                    <a *ngIf="disabled==false" href="javascript:;" (click)="checkAll();">
                                        @if(checkboxAll == 1){
                                        <i class="bi bi-check-square"></i>
                                        }@else {
                                        <i class="bi bi-square"></i>
                                        }
                                    </a>
                                    Enabled
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let x of items; let i = index">


                                <td>{{i+1}}</td>
                                <td> {{x.name}}</td>
                                <td> {{x.category | uppercase}}</td>
                                <td >
                                    <a href="javascript:;" *ngIf="disabled==false" (click)=" x.authLevelId == null ? x.authLevelId = id : x.authLevelId = null">
                                        <i *ngIf="x.authLevelId == null" class="bi bi-square"></i>

                                        <i *ngIf="x.authLevelId == id" class="bi bi-check-square"></i>
                                    </a>
                                  
                                    <span *ngIf="x.authLevelId == id" class="badge text-bg-primary mx-2">Enable</span>
                                </td>

                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>


<ng-template #content let-modal>
    <div class="modal-header">
        <strong class="modal-title" id="modal-basic-title">Access Right Level A</strong>
        <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
    </div>
    <div class="modal-body">
        <form (ngSubmit)="onSubmit()" #actorForm="ngForm">
            <div class="mb-2">
                <label for="desc1">Description*</label>
                <input id="desc1" class="form-control form-control-sm" name="desc1" [(ngModel)]="model.desc1" required
                    #desc1="ngModel" />
                <small [hidden]="desc1.valid || desc1.pristine" class="text-danger">
                    *desc1 is required
                </small>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-sm btn-dark" [disabled]="!actorForm.form.valid">Save</button>
            </div>
        </form>
    </div>

</ng-template>
